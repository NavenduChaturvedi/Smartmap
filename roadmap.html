
<!DOCTYPE html>

<html class="dark" lang="en">
	<head>
		<meta charset="utf-8" />
		<meta content="width=device-width, initial-scale=1.0" name="viewport" />
		<title>MISSION ROADMAP | AEGIS COMMAND CENTER</title>
		<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
		<link
			href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Roboto+Mono:wght@400;500;700&display=swap"
			rel="stylesheet"
		/>
		<link
			href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
			rel="stylesheet"
		/>
		<script src="js/tailwind-config.js"></script>
		<link rel="stylesheet" href="css/base.css" />
		<script type="module" src="js/supabase-client.js"></script>
		<script src="js/app.js"></script>
		<script src="js/components.js"></script>
	</head>
	<body class="bg-background text-on-background font-body-md min-h-screen relative overflow-x-hidden selection:bg-primary selection:text-on-primary">
		<div class="fixed inset-0 scanlines opacity-[0.05] z-50 pointer-events-none"></div>
		<aegis-sidebar></aegis-sidebar>

		<main class="ml-64 min-h-screen flex flex-col pr-0 lg:pr-[420px]">
			<aegis-topbar title="MISSION_ROADMAP" subtitle="Path to Integration"></aegis-topbar>

			<div class="p-margin space-y-margin">
				<header class="flex flex-col lg:flex-row lg:items-end lg:justify-between gap-6 border-b border-outline-variant/30 pb-6">
					<div>
						<p class="font-label-caps text-label-caps text-on-surface-variant mb-1 tracking-[0.4em] font-bold">STRATEGIC NAVIGATION</p>
							<h1 class="font-h1 text-h1 text-on-surface uppercase tracking-tighter font-extrabold italic leading-none" id="roadmap-title">ROADMAP GRID</h1>
						</div>
						<div class="flex items-center gap-3">
							<span class="font-label-mono text-[10px] text-on-surface-variant uppercase tracking-widest" id="mission-count">0 ACTIVE</span>
							<span class="font-label-caps text-[10px] text-primary bg-primary/10 border border-primary/20 px-3 py-1 rounded-full uppercase" id="active-track">NO_ROADMAP</span>
				<section class="grid grid-cols-1 lg:grid-cols-3 gap-gutter">
									<h1 class="font-h1 text-h1 text-on-surface uppercase tracking-tighter font-extrabold italic leading-none" id="roadmap-title">ROADMAP GRID</h1>
								</div>
								<div class="flex items-center gap-3 flex-wrap">
									<span class="font-label-mono text-[10px] text-on-surface-variant uppercase tracking-widest" id="mission-count">0 ACTIVE</span>
									<span class="font-label-caps text-[10px] text-primary bg-primary/10 border border-primary/20 px-3 py-1 rounded-full uppercase" id="active-track">NO_ROADMAP</span>
									<button id="add-task-btn" class="px-4 py-2 rounded-full border border-primary/30 text-primary uppercase tracking-widest text-[10px] font-bold hover:bg-primary/10 transition-colors" type="button">Add Task</button>
							</div>
							<div class="mt-8 grid grid-cols-1 md:grid-cols-2 gap-gutter">
								<button class="roadmap-node glass-panel p-5 rounded-xl text-left border border-outline-variant/20 hover:border-primary/50 transition-all" data-node="NODE_01">
									<div class="flex items-center justify-between mb-3">
										<span class="font-label-mono text-[10px] text-on-surface-variant uppercase">NODE_01</span>
										<span class="font-label-caps text-[10px] text-primary uppercase">SECURED</span>
									</div>
											<h2 class="font-h3 text-h3 text-on-surface uppercase tracking-tighter">Mission Tasks</h2>
											<span class="font-label-mono text-[10px] text-on-surface-variant uppercase tracking-widest" id="task-summary">0 ACTIVE</span>
								</button>
										<div class="mt-8 grid grid-cols-1 md:grid-cols-2 gap-gutter" id="roadmap-tasks-list"></div>
					</div>

					<div class="space-y-gutter" id="roadmap-sidebar"></div>
				</section>
			</div>
		</main>

		<aside id="mission-panel" class="hidden lg:flex fixed right-0 top-0 h-full w-[400px] bg-surface-container-low border-l border-outline-variant/30 px-8 py-margin flex-col shadow-2xl z-40 overflow-y-auto">
			<div class="flex items-center justify-between mb-8 pb-4 border-b border-outline-variant/20">
				<span class="font-label-mono text-[10px] text-on-surface-variant uppercase tracking-widest">Selected_Target</span>
				<button id="mission-close-btn" class="material-symbols-outlined text-outline-variant hover:text-primary transition-colors text-[20px] cursor-pointer px-2 bg-transparent border-0 p-0">close</button>
			</div>
			<p class="font-h2 text-h2 text-primary mb-2" id="mission-title">Mission Briefing</p>
			<div class="flex items-center gap-2 mb-6">
				<span class="font-label-mono text-[10px] text-primary bg-primary/10 border border-primary/20 px-2 py-0.5 rounded uppercase">MAIN_QUEST</span>
				<span class="font-label-mono text-[10px] text-on-surface-variant uppercase" id="mission-reward">0 XP</span>
			</div>
			<p class="font-body-sm text-on-surface-variant/90 border-l-2 border-primary/50 pl-4 py-1 mb-8" id="mission-description">Select a node</p>
			<p class="font-label-caps text-xs text-on-surface uppercase mb-4 tracking-widest border-b border-outline-variant/20 pb-2">Sub_Objectives</p>
			<div class="space-y-4 mb-auto" id="mission-subnodes"></div>
			<button id="mission-action-btn" class="mt-8 w-full py-4 bg-primary text-background font-bold tracking-widest uppercase hover:opacity-90 transition-all flex justify-center items-center gap-3">
				<span id="mission-action">INITIALIZE LOGIC</span>
				<span class="material-symbols-outlined text-[18px]">keyboard_double_arrow_right</span>
			</button>
		</aside>

		<script src="js/roadmap.js"></script>
	</body>
</html>
